<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación de Rebote | C. Rodríguez</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="icon" type="image/png" href="./assets/img/favicon.png">
</head>
<body class="d-flex flex-column">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="#">ITP Simulation</a>
            <span class="navbar-text text-white"> Christopher Rodríguez Pérez </span>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center p-2">
        <div class="glass-card p-4 shadow-lg text-center">
            <h2 class="mb-3 text-white">Panel de Niveles</h2>
            
            <div class="row g-3 mb-3 justify-content-center align-items-center">
                <div class="col-auto">
                    <div class="stats-box">
                        <small class="text-white-50 d-block">Eliminados</small>
                        <span id="score-num" class="h4 text-white">0</span>
                    </div>
                </div>
                <div class="col-auto">
                    <div class="stats-box">
                        <small class="text-white-50 d-block">Progreso</small>
                        <span id="score-percent" class="h4 text-info">0%</span>
                    </div>
                </div>
                <div class="col-auto">
                    <div class="stats-box">
                        <small class="text-white-50 d-block">Seleccionar Nivel</small>
                        <select id="level-selector" class="form-select form-select-sm bg-dark text-warning border-0">
                            <option value="1">Nivel 1</option>
                            <option value="2">Nivel 2</option>
                            <option value="3">Nivel 3</option>
                            <option value="4">Nivel 4</option>
                            <option value="5">Nivel 5</option>
                            <option value="6">Nivel 6</option>
                            <option value="7">Nivel 7</option>
                            <option value="8">Nivel 8</option>
                            <option value="9">Nivel 9</option>
                            <option value="10">Nivel 10</option>
                        </select>
                    </div>
                </div>
                <div class="col-auto">
                    <button id="btn-rebote" class="btn btn-primary btn-sm px-3">Iniciar Nivel</button>
                </div>
            </div>

            <canvas id="canvas-rebote" class="rounded border border-light"></canvas>
            <p id="game-msg" class="mt-2 text-white-50 small mb-0">Selecciona un nivel y haz clic en todos los círculos.</p>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-2 mt-auto">
        <div class="container">
            <p class="mb-0 small">© 2026 - Desarrollado por <strong>Christopher Rodríguez Pérez</strong></p>
            <small style="font-size: 0.7rem;">Instituto Tecnológico de Pachuca - Ingeniería en Sistemas</small>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
